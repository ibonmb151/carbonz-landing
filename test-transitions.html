<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Transiciones — Dual Image</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: #111; }
        body { font-family: 'Inter', sans-serif; background: #111; color: #f5f5f7; overflow-x: hidden; }

        /* SELECTOR */
        .sel {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; gap: 4px; padding: 5px;
            background: rgba(30,30,30,0.95); backdrop-filter: blur(16px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap; justify-content: center; max-width: 95vw;
        }
        .sel button {
            font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 600;
            padding: 7px 12px; border: none; border-radius: 8px; cursor: pointer;
            background: transparent; color: #8e8e93; transition: all 0.2s; white-space: nowrap;
        }
        .sel button:hover { color: #fff; background: rgba(255,255,255,0.06); }
        .sel button.on { background: #fff; color: #000; }
        .sel-info {
            position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
            z-index: 9999; font-size: 0.6rem; color: #636366;
            letter-spacing: 0.08em; text-transform: uppercase; text-align: center;
        }

        /* HERO */
        .hero { height: 500vh; position: relative; }
        .hero-sticky { position: sticky; top: 0; height: 100vh; overflow: hidden; }
        .hero-bg {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 100% 80% at 50% 50%, #555, #444 20%, #333 40%, #222 65%, #111);
        }
        .img-wrap {
            position: absolute; inset: 0;
        }

        /* ALL FRAMES — absolute, centered */
        .frame {
            position: absolute;
            width: 55%; max-width: 560px; height: auto;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
            opacity: 0; pointer-events: none;
            top: 50%; left: 50%;
            transition: none;
        }
        .frame.show { opacity: 1; pointer-events: auto; }

        /* ============================================
           1. SPLIT SLIDE — deux panneaux glissent à gauche/droite
           Left image exits left, right exits right. New pair enters from opposite sides.
           ============================================ */
        .wrap-split .frame { transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s cubic-bezier(0.4,0,0.2,1); }
        .wrap-split .frame.pos-l { transform: translate(-70%, -50%); }
        .wrap-split .frame.pos-r { transform: translate(-30%, -50%); }
        .wrap-split .frame.pos-c { transform: translate(-50%, -50%); }
        .wrap-split .frame.exit-l { opacity: 0; transform: translate(-130%, -50%) scale(0.9); }
        .wrap-split .frame.exit-r { opacity: 0; transform: translate(30%, -50%) scale(0.9); }
        .wrap-split .frame.enter-l { opacity: 0; transform: translate(-130%, -50%) scale(0.9); }
        .wrap-split .frame.enter-r { opacity: 0; transform: translate(30%, -50%) scale(0.9); }

        /* ============================================
           2. VERTICAL STRIP — deux images empilées qui défilent verticalement
           ============================================ */
        .wrap-strip .frame { transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s cubic-bezier(0.4,0,0.2,1); }
        .wrap-strip .frame.pos-t { transform: translate(-50%, -75%); }
        .wrap-strip .frame.pos-b { transform: translate(-50%, -25%); }
        .wrap-strip .frame.exit-up { opacity: 0; transform: translate(-50%, -140%) scale(0.9); }
        .wrap-strip .frame.exit-down { opacity: 0; transform: translate(-50%, 40%) scale(0.9); }
        .wrap-strip .frame.enter-up { opacity: 0; transform: translate(-50%, -140%) scale(0.9); }
        .wrap-strip .frame.enter-down { opacity: 0; transform: translate(-50%, 40%) scale(0.9); }

        /* ============================================
           3. DIAGONAL CROSS — images en diagonale, sortent par les coins
           ============================================ */
        .wrap-diag .frame { transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s cubic-bezier(0.4,0,0.2,1); }
        .wrap-diag .frame.pos-tl { transform: translate(-75%, -75%); }
        .wrap-diag .frame.pos-br { transform: translate(-25%, -25%); }
        .wrap-diag .frame.exit-tl { opacity: 0; transform: translate(-150%, -150%) scale(0.8); }
        .wrap-diag .frame.exit-br { opacity: 0; transform: translate(50%, 50%) scale(0.8); }
        .wrap-diag .frame.enter-tl { opacity: 0; transform: translate(-150%, -150%) scale(0.8); }
        .wrap-diag .frame.enter-br { opacity: 0; transform: translate(50%, 50%) scale(0.8); }

        /* ============================================
           4. OVERLAP PARALLAX — deux images superposées, la devant glisse plus vite
           ============================================ */
        .wrap-overlap .frame { transition: transform 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.55s cubic-bezier(0.4,0,0.2,1); }
        .wrap-overlap .frame.pos-back { transform: translate(-50%, -50%) scale(0.88); z-index: 1; }
        .wrap-overlap .frame.pos-front { transform: translate(-50%, -50%) scale(1); z-index: 2; }
        .wrap-overlap .frame.exit-fast { opacity: 0; transform: translate(-50%, -50%) translateX(60%) scale(1.05); z-index: 3; }
        .wrap-overlap .frame.exit-slow { opacity: 0; transform: translate(-50%, -50%) translateX(-30%) scale(0.85); z-index: 1; }
        .wrap-overlap .frame.enter-fast { opacity: 0; transform: translate(-50%, -50%) translateX(-60%) scale(1.05); z-index: 3; }
        .wrap-overlap .frame.enter-slow { opacity: 0; transform: translate(-50%, -50%) translateX(30%) scale(0.85); z-index: 1; }

        /* ============================================
           5. CORNER SWAP — deux images dans des coins opposés, elles échangent les positions
           ============================================ */
        .wrap-corner .frame { transition: transform 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.55s cubic-bezier(0.4,0,0.2,1); }
        .wrap-corner .frame.pos-tl { transform: translate(-80%, -80%) scale(0.7); }
        .wrap-corner .frame.pos-br { transform: translate(-20%, -20%) scale(0.7); }
        .wrap-corner .frame.exit-tl { opacity: 0; transform: translate(-80%, -80%) scale(0.4) rotate(-15deg); }
        .wrap-corner .frame.exit-br { opacity: 0; transform: translate(-20%, -20%) scale(0.4) rotate(15deg); }
        .wrap-corner .frame.enter-tl { opacity: 0; transform: translate(-80%, -80%) scale(0.4) rotate(-15deg); }
        .wrap-corner .frame.enter-br { opacity: 0; transform: translate(-20%, -20%) scale(0.4) rotate(15deg); }

        /* DOTS */
        .dots { position: absolute; bottom: 13vh; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.18); transition: all 0.3s; }
        .dot.on { background: #f5f5f7; width: 20px; border-radius: 3px; }
        .fl { position: absolute; bottom: calc(13vh + 24px); left: 50%; transform: translateX(-50%); font-size: 0.6rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #8e8e93; z-index: 10; }

        /* CONTENT */
        .ct { position: absolute; z-index: 20; left: 48px; bottom: 20vh; max-width: 600px; }
        .ct .ey { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #30d158; margin-bottom: 16px; }
        .ct h1 { font-size: clamp(3.5rem, 10vw, 7.5rem); font-weight: 900; letter-spacing: -0.045em; line-height: 0.88; margin-bottom: 20px; color: #fff; }
        .ct h1 .thin { font-weight: 300; color: #8e8e93; display: block; font-size: 0.38em; letter-spacing: 0.08em; margin-bottom: 8px; }
        .ct .ds { font-size: 1rem; color: #aeaeb2; line-height: 1.6; max-width: 300px; margin-bottom: 24px; }
        .pr { display: flex; align-items: baseline; gap: 10px; margin-bottom: 24px; }
        .pr .p { font-size: 1.6rem; font-weight: 800; color: #fff; }
        .pr .op { font-size: 0.9rem; color: #636366; text-decoration: line-through; }
        .pr .sh { font-size: 0.7rem; color: #8e8e93; }
        .bh { display: inline-flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; color: #000; background: #fff; padding: 12px 28px; border-radius: 980px; text-decoration: none; }
        .si { position: absolute; bottom: 24px; right: 48px; z-index: 10; font-size: 0.5rem; color: #636366; letter-spacing: 0.2em; text-transform: uppercase; writing-mode: vertical-rl; }
        .si .ln { width: 1px; height: 32px; background: linear-gradient(to bottom, #636366, transparent); margin-bottom: 8px; animation: pls 2s ease-in-out infinite; }
        @keyframes pls { 0%,100% { opacity:.3; transform:scaleY(.6); } 50% { opacity:1; transform:scaleY(1); } }

        .spacer { height: 100vh; background: #111; display: flex; align-items: center; justify-content: center; }
        .spacer p { color: #636366; font-size: 1rem; }
    </style>
</head>
<body>

<div class="sel">
    <button class="on" onclick="setT('split',this)">1. Split Slide</button>
    <button onclick="setT('strip',this)">2. Vertical Strip</button>
    <button onclick="setT('diag',this)">3. Diagonal Cross</button>
    <button onclick="setT('overlap',this)">4. Overlap Parallax</button>
    <button onclick="setT('corner',this)">5. Corner Swap</button>
</div>
<div class="sel-info" id="info">1. Split Slide — dos paneles laterales se deslizan</div>

<div class="hero" id="hero">
    <div class="hero-sticky" id="hs">
        <div class="hero-bg"></div>
        <div class="img-wrap wrap-split" id="iw">
            <img src="hero-frontal.png" class="frame show pos-c" id="f0">
            <img src="diagonal.png" class="frame" id="f1">
            <img src="lateral2.png" class="frame" id="f2">
            <img src="trasera.png" class="frame" id="f3">
        </div>
        <div class="dots">
            <span class="dot on" id="d0"></span>
            <span class="dot" id="d1"></span>
            <span class="dot" id="d2"></span>
            <span class="dot" id="d3"></span>
        </div>
        <div class="fl" id="fl">Vista frontal</div>
        <div class="ct">
            <p class="ey">Fibra de carbono forjada</p>
            <h1><span class="thin">CÚPULA</span>Z900</h1>
            <p class="ds">Ligereza. Resistencia. Sin concesiones.</p>
            <div class="pr">
                <span class="p">151€</span>
                <span class="op">189€</span>
                <span class="sh">Envío incluido</span>
            </div>
            <a href="#" class="bh">Comprar ahora <svg viewBox="0 0 14 14" fill="none" width="11" height="11"><path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
        </div>
        <div class="si"><div class="ln"></div>Scroll</div>
    </div>
</div>

<div class="spacer"><p>↓ Fin del hero</p></div>

<script>
const F = [0,1,2,3].map(i => document.getElementById('f'+i));
const D = [0,1,2,3].map(i => document.getElementById('d'+i));
const LB = document.getElementById('fl');
const IW = document.getElementById('iw');
const HS = document.getElementById('hs');
const hero = document.getElementById('hero');
const LABELS = ['Vista frontal', 'Vista diagonal', 'Vista lateral', 'Vista trasera'];
const DESCRIPTIONS = {
    split: '1. Split Slide — dos paneles laterales se deslizan',
    strip: '2. Vertical Strip — dos paneles apilados desfilan',
    diag: '3. Diagonal Cross — diagonales cruzan',
    overlap: '4. Overlap Parallax — capas con profundidad',
    corner: '5. Corner Swap — esquinas opuestas giran'
};

let curT = 'split';
let curF = 0;
let busy = false;

// Positions for each transition: [frame_index] => CSS class pair
// Each step shows 2 images: the "leaving" one and the "arriving" one
const STEPS = {
    // Each step: [[frame_to_show_1, pos_class_1], [frame_to_show_2, pos_class_2]]
    // Transitions define how frames move between steps
};

function setT(t, btn) {
    curT = t;
    IW.className = 'img-wrap wrap-' + t;
    // Reset: show only frame 0 centered
    F.forEach((f,i) => {
        f.className = 'frame' + (i === 0 ? ' show pos-c' : '');
    });
    curF = 0;
    D.forEach((d,i) => { d.className = 'dot' + (i === 0 ? ' on' : ''); });
    LB.textContent = LABELS[0];
    document.querySelectorAll('.sel button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('info').textContent = DESCRIPTIONS[t];
}

function go(from, to) {
    if (busy || from === to) return;
    busy = true;
    const t = curT;
    const old = F[from];
    const nw = F[to];

    // Remove all position/exit/enter classes first
    function reset(f) {
        f.className = 'frame';
    }

    if (t === 'split') {
        // Old exits opposite side, new enters from opposite side
        reset(old);
        old.classList.add(from % 2 === 0 ? 'exit-l' : 'exit-r');
        reset(nw);
        nw.classList.add(to % 2 === 0 ? 'enter-r' : 'enter-l');
        void nw.offsetWidth;
        nw.classList.remove(to % 2 === 0 ? 'enter-r' : 'enter-l');
        nw.classList.add('show', to % 2 === 0 ? 'pos-l' : 'pos-r');
    }
    else if (t === 'strip') {
        reset(old);
        old.classList.add(from % 2 === 0 ? 'exit-up' : 'exit-down');
        reset(nw);
        nw.classList.add(to % 2 === 0 ? 'enter-down' : 'enter-up');
        void nw.offsetWidth;
        nw.classList.remove(to % 2 === 0 ? 'enter-down' : 'enter-up');
        nw.classList.add('show', to % 2 === 0 ? 'pos-t' : 'pos-b');
    }
    else if (t === 'diag') {
        reset(old);
        old.classList.add(from % 2 === 0 ? 'exit-tl' : 'exit-br');
        reset(nw);
        nw.classList.add(to % 2 === 0 ? 'enter-br' : 'enter-tl');
        void nw.offsetWidth;
        nw.classList.remove(to % 2 === 0 ? 'enter-br' : 'enter-tl');
        nw.classList.add('show', to % 2 === 0 ? 'pos-tl' : 'pos-br');
    }
    else if (t === 'overlap') {
        reset(old);
        old.classList.add(from % 2 === 0 ? 'exit-fast' : 'exit-slow');
        reset(nw);
        nw.classList.add(to % 2 === 0 ? 'enter-fast' : 'enter-slow');
        void nw.offsetWidth;
        nw.classList.remove(to % 2 === 0 ? 'enter-fast' : 'enter-slow');
        nw.classList.add('show', to % 2 === 0 ? 'pos-front' : 'pos-back');
    }
    else if (t === 'corner') {
        reset(old);
        old.classList.add(from % 2 === 0 ? 'exit-tl' : 'exit-br');
        reset(nw);
        nw.classList.add(to % 2 === 0 ? 'enter-br' : 'enter-tl');
        void nw.offsetWidth;
        nw.classList.remove(to % 2 === 0 ? 'enter-br' : 'enter-tl');
        nw.classList.add('show', to % 2 === 0 ? 'pos-tl' : 'pos-br');
    }

    D[from].classList.remove('on');
    D[to].classList.add('on');
    LB.textContent = LABELS[to];
    curF = to;

    setTimeout(() => {
        busy = false;
    }, 600);
}

function onScroll() {
    const y = window.pageYOffset;
    const top = hero.offsetTop;
    const h = hero.offsetHeight;
    const vh = window.innerHeight;
    const bot = top + h;

    if (y >= top && y < bot - vh) {
        HS.style.position = 'fixed';
        HS.style.top = '0';
        HS.style.left = '0';
        HS.style.width = '100%';
        HS.style.zIndex = '';

        const p = (y - top) / (h - vh);
        const fi = Math.min(Math.floor(p * 4), 3);
        if (fi !== curF) go(curF, fi);
    } else if (y < top) {
        HS.style.position = 'relative';
        HS.style.top = 'auto';
        HS.style.zIndex = '';
        // Reset to frame 0
        if (curF !== 0) {
            F.forEach((f,i) => { f.className = 'frame' + (i === 0 ? ' show pos-c' : ''); });
            curF = 0;
            D.forEach((d,i) => { d.className = 'dot' + (i === 0 ? ' on' : ''); });
            LB.textContent = LABELS[0];
        }
    } else {
        HS.style.position = 'fixed';
        HS.style.top = '0';
        HS.style.left = '0';
        HS.style.width = '100%';
        HS.style.zIndex = '0';
    }
}

window.addEventListener('scroll', onScroll, { passive: true });
onScroll();
</script>
</body>
</html>
